; ── Fnoon production PHP settings ───────────────────────────────────────────
; Tuned for the upload engine: media POST (≤50MB) and proxy chunk PUT (~16MB).
expose_php = Off
memory_limit = 512M

upload_max_filesize = 64M
post_max_size = 64M
max_file_uploads = 30

max_execution_time = 300
max_input_time = 300

; Timezone (override with TZ env if needed)
date.timezone = UTC

; ── OPcache (production) ────────────────────────────────────────────────────
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
