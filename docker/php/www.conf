; PHP-FPM pool tuning for Fnoon.
[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Surface fatal errors to the container log.
catch_workers_output = yes
decorate_workers_output = no
clear_env = no

; A long-running finalise() (proxy upload → S3) must not be killed early.
request_terminate_timeout = 600
