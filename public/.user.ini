; Fnoon — PHP limits for the big-file (chunked) upload engine.
; The browser PUTs 16MB chunks to /upload/multipart/put-part; the default PHP
; post_max_size (8M) rejects them. php-fpm reads this per-directory file.
upload_max_filesize = 1024M
post_max_size = 1024M
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
