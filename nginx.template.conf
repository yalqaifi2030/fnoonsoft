worker_processes 5;
daemon off;

worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
}

http {
    include    $!{nginx}/conf/mime.types;
    index    index.html index.htm index.php;

    default_type application/octet-stream;
    access_log   /dev/stdout;
    error_log    /dev/stderr;
    sendfile     on;
    tcp_nopush   on;
    server_names_hash_bucket_size 128;

    # Upload engine: media POST (≤50MB) + proxied chunk PUT (~16MB).
    client_max_body_size 64M;
    client_body_timeout 300s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    server {
        # Nixpacks injects $PORT (Coolify health-checks this port).
        listen ${PORT};
        listen [::]:${PORT};
        server_name _;

        # Laravel entry point — serve from public/, never the project root.
        root /app/public;
        index index.php;

        charset utf-8;

        # Exactly ONE location / — avoids the "duplicate location" crash that
        # Coolify's default Nixpacks template produces via NIXPACKS_PHP_FALLBACK_PATH.
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include $!{nginx}/conf/fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_read_timeout 300s;
            fastcgi_buffering off;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
